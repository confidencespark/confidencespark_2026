# Project-wide Gradle settings.

org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=false
org.gradle.workers.max=1

android.useAndroidX=true

# Phone APKs: arm64-v8a (change only when you know why)
reactNativeArchitectures=arm64-v8a

newArchEnabled=true
hermesEnabled=true
edgeToEdgeEnabled=false

# Release signing — replace with your keystore values (or use debug signing if file missing)
MYAPP_UPLOAD_STORE_FILE=app-upload.keystore
MYAPP_UPLOAD_KEY_ALIAS=YOUR_KEY_ALIAS
MYAPP_UPLOAD_STORE_PASSWORD=YOUR_STORE_PASSWORD
MYAPP_UPLOAD_KEY_PASSWORD=YOUR_KEY_PASSWORD
